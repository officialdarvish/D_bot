
version: "3.9"

services:
  frontend:
    build: ../frontend
    ports:
      - "3000:3000"

  backend:
    build: ../backend
    ports:
      - "8000:8000"

  gateway:
    build: ../gateway
    ports:
      - "9000:9000"

  worker:
    build: ../worker

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ../infra/nginx/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - frontend
      - backend
      - gateway
